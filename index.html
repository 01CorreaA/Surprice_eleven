<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Para mi gatito</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="overlay" id="overlay">
        <div class="overlay-content">
            <h1 class="overlay-text">Cargando ....</h1>
            <div class="progress-bar">
                <div class="progress"></div>
            </div>
        </div>
    </div>

    <div class="bg-overlay" id="bgOverlay"></div>
    <div class="container" id="container"></div>

    <div class="blog-post" id="blogPost">
        <div class="blog-card">
            <h2 class="blog-title">📖 Para mi gatito 💕</h2>
            <div id="blogContent"></div>

            <div class="gift-wrapper" id="giftWrapper" style="display: none;">
                <div class="gift-box" id="giftBox">
                    <div class="gift-lid"></div>
                    <div class="gift-message-emergente" id="giftMessage">
                        💌 <strong>¡Sorpresa!</strong> 💌<br><br>
                        Quizá debas pedirme tu dibujo en persona... <span class="heart-emoji">❤️</span><br>
                        Aunque ya debes estar viniendo, wa mi gatito<br>
                        Ya quiero verte y para que veas tambien lo q tengo.
                    </div>
                </div>
                <p class="gift-hint" id="giftHint">🎁 Toca el regalo 🎁</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
